<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Titolo e descrizione ── -->
    <title>Lenticchia — Spesa intelligente</title>
    <meta name="description" content="Confronta le offerte dei supermercati a Roma e Mantova. Risparmia ogni settimana con il Verdetto Spesa." />

    <!-- ── PWA manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Theme color (barra del browser e status bar) ── -->
    <meta name="theme-color" content="#647144" />

    <!-- ── iOS / Safari specifico ── -->
    <!-- apple-mobile-web-app-capable: nasconde la barra Safari quando installata -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lenticchia" />
    <!-- Icone per iOS (non usa il manifest) -->
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

    <!-- ── Android / Chrome ── -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Favicon standard ── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />

    <!-- ── Open Graph (condivisione social/WhatsApp) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lenticchia — Spesa intelligente" />
    <meta property="og:description" content="Confronta le offerte dei supermercati. Risparmia ogni settimana." />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- ── Fonts Google (già usati nell'app) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ── Registrazione Service Worker ── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then(reg => {
              console.log('[SW] Registrato:', reg.scope);

              // Notifica l'utente quando c'è un aggiornamento disponibile
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // C'è una nuova versione — l'app la gestirà con un banner
                    window.dispatchEvent(new CustomEvent('sw-update-available'));
                  }
                });
              });
            })
            .catch(err => console.warn('[SW] Registrazione fallita:', err));
        });
      }
    </script>
  </body>
</html>
